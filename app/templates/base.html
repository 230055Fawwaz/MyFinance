<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}MyFinance{% endblock %}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        {% block extra_css %}{% endblock %}

        <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
        </script>
    </head>
    <body>
        <div class="app-container">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>MyFinance</h2>
                    <div class="header-buttons">
                        <button id="theme-toggle" class="toggle-btn" title="Ubah Tema">🌙</button>
                        <button id="toggle-btn" class="toggle-btn" title="Menu">☰</button>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <ul>
                        <li>
                            <a href="{{ url_for('main.dashboard') }}">
                                <span class="nav-icon">📊</span>
                                <span class="nav-text">Dashboard</span>
                            </a>
                        </li>
                        <li>
                            <a href="{{ url_for('main.transaksi') }}">
                                <span class="nav-icon">💸</span>
                                <span class="nav-text">Transaksi</span>
                            </a>
                        </li>
                        <li>
                            <a href="{{ url_for('main.akun') }}">
                                <span class="nav-icon">🏦</span>
                                <span class="nav-text">Akun</span>
                            </a>
                        </li>
                        <li>
                            <a href="{{ url_for('main.laporan') }}">
                                <span class="nav-icon">📈</span>
                                <span class="nav-text">Laporan</span>
                            </a>
                        </li>
                        <li>
                            <a href="{{ url_for('main.dropdown') }}">
                                <span class="nav-icon">⚙️</span>
                                <span class="nav-text">Dropdown Menu</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>
            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
        
        <script>
        const themeToggle = document.getElementById('theme-toggle');
        const updateToggleIcon = (theme) => {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        };
        updateToggleIcon(document.documentElement.getAttribute('data-theme'));

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleIcon(newTheme);
        });
        </script>
        {% block extra_js %}{% endblock %}
    </body>
</html>
