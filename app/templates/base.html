<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyFinance{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Blok untuk CSS tambahan khusus per halaman -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>MyFinance</h2>
                <button id="toggle-btn" class="toggle-btn">☰</button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{{ url_for('transaksi') }}">Transaksi</a></li>
                    <li><a href="{{ url_for('akun') }}">Akun</a></li>
                    <li><a href="{{ url_for('laporan') }}">Laporan</a></li>
                    <li><a href="{{ url_for('dropdown') }}">Dropdown Menu</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    
    <!-- Blok untuk JS tambahan khusus per halaman -->
    {% block extra_js %}{% endblock %}
</body>
</html>
