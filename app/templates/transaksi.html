<!-- Halaman transaksi -->

{% extends 'base.html' %}

{% block title %}Transaksi - MyFinance{% endblock %}

{% block content %}
<div class="content-header">
    <h1>Histori Transaksi</h1>
    <button class="btn btn-primary" id="btn-tambah-transaksi">+ Tambah Transaksi</button>
</div>

<div class="table-container">
    <table class="data-table">
        <thead>
            <tr>
                <th>Nama Akun</th>
                <th>Kategori</th>
                <th>Sub-Kategori</th>
                <th>Detail</th>
                <th>Tanggal</th>
                <th>Nominal</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>BCA</td>
                <td>Makanan</td>
                <td>Restoran</td>
                <td>Makan siang</td>
                <td>2026-04-01</td>
                <td>Rp 50.000</td>
                <td>
                    <button class="btn-edit">Edit</button>
                    <button class="btn-hapus">Hapus</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div id="modal-transaksi" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Tambah Transaksi Baru</h2>
        <form action="#" method="POST">
            
            <label for="account_id">Nama Akun:</label>
            <select id="account_id" name="account_id" required>
                <option value="" disabled selected>-- Pilih Akun --</option>
                <option value="1">BCA</option>
                <option value="2">Gopay</option>
            </select>

            <label for="kategori">Kategori:</label>
            <select id="kategori" name="kategori" required>
                <option value="" disabled selected>-- Pilih Kategori --</option>
                <option value="1">Makanan</option>
                <option value="2">Transportasi</option>
            </select>

            <label for="subcategory_id">Sub-Kategori:</label>
            <select id="subcategory_id" name="subcategory_id" required>
                <option value="" disabled selected>-- Pilih Sub-Kategori --</option>
                <option value="1">Restoran</option>
                <option value="2">Groceries</option>
            </select>

            <label for="amount">Nominal (Rp):</label>
            <input type="number" id="amount" name="amount" required placeholder="Misal: 50000">

            <label for="date">Tanggal:</label>
            <input type="date" id="date" name="date" required>

            <label for="note">Detail / Catatan:</label>
            <textarea id="note" name="note" rows="2" placeholder="Misal: Makan siang di warteg"></textarea>

            <button type="submit" class="btn btn-success">Simpan Transaksi</button>
        </form>
    </div>
</div>
{% endblock %}
