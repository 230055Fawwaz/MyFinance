<!-- Halaman akun -->

{% extends 'base.html' %}

{% block title %}Akun - MyFinance{% endblock %}

{% block content %}
<div class="content-header">
    <h1>Daftar Akun</h1>
    <button class="btn btn-primary" id="btn-tambah-akun">+ Tambah Akun</button>
</div>

<div class="cards-container">
    <div class="card account-card">
        <div class="card-header">
            <h3>BCA</h3>
            <button class="btn-edit-small">Edit</button>
        </div>
        <div class="card-body">
            <p class="account-type">Bank</p>
            <h2 class="account-balance">Rp 5.000.000</h2>
        </div>
    </div>

    <div class="card account-card">
        <div class="card-header">
            <h3>Gopay</h3>
            <button class="btn-edit-small">Edit</button>
        </div>
        <div class="card-body">
            <p class="account-type">E-Wallet</p>
            <h2 class="account-balance">Rp 250.000</h2>
        </div>
    </div>
</div>

<div id="modal-akun" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Tambah Akun Baru</h2>
        <form action="#" method="POST">
            <label for="nama_akun">Nama Akun:</label>
            <input type="text" id="nama_akun" name="nama" required placeholder="Misal: BCA, Gopay">

            <label for="tipe_akun">Tipe Akun:</label>
            <input type="text" id="tipe_akun" name="type" required placeholder="Misal: Bank, E-Wallet">

            <label for="saldo">Saldo Awal:</label>
            <input type="number" id="saldo" name="balance" required value="0">

            <button type="submit" class="btn btn-success">Simpan</button>
        </form>
    </div>
</div>
{% endblock %}
